<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🏇 ネット競馬データ収集</title>
<style>
:root {
  --dirt: #8B5E3C;
  --turf: #2D6A4F;
  --gold: #D4A017;
  --bg: #0F0F1A;
  --card: #1A1A2E;
  --card2: #16213E;
  --border: rgba(212,160,23,.2);
  --text: #F0ECE3;
  --text2: #A8A090;
  --red: #E63946;
  --green: #52B788;
  --blue: #457B9D;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',sans-serif;min-height:100vh}

/* ヘッダー */
.header{background:linear-gradient(135deg,#0F0F1A,#1A1A2E);border-bottom:2px solid var(--gold);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.header-title{font-size:18px;font-weight:800;letter-spacing:.03em}
.header-sub{font-size:10px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase}
.status-dot{width:8px;height:8px;border-radius:50%;background:#666;flex-shrink:0}
.status-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}

/* メインボタン */
.fetch-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:18px;background:linear-gradient(135deg,var(--gold),#B8860B);color:#000;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:.03em;transition:all .2s;margin-bottom:16px}
.fetch-btn:active{transform:scale(.98);opacity:.9}
.fetch-btn:disabled{background:#333;color:#666;cursor:not-allowed}

/* カード */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.card-title{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}

/* ステータスログ */
.log-area{background:var(--card2);border-radius:8px;padding:10px;max-height:160px;overflow-y:auto;font-size:11px;font-family:monospace;color:#7fff7f;line-height:1.8}
.log-item{display:flex;gap:6px}
.log-item .ts{color:#555;flex-shrink:0}
.log-item.err{color:var(--red)}
.log-item.warn{color:var(--gold)}
.log-item.ok{color:var(--green)}

/* レース一覧 */
.race-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.race-item.saved{border-color:var(--green)}
.race-item.failed{border-color:var(--red)}
.race-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.race-rank{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;background:#333;color:var(--text2)}
.race-name{font-size:13px;font-weight:700;flex:1}
.race-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700}
.badge-saved{background:rgba(82,183,136,.2);color:var(--green);border:1px solid rgba(82,183,136,.4)}
.badge-failed{background:rgba(230,57,70,.15);color:var(--red);border:1px solid rgba(230,57,70,.3)}
.badge-pending{background:rgba(212,160,23,.1);color:var(--gold);border:1px solid rgba(212,160,23,.3)}
.race-meta{font-size:10px;color:var(--text2);display:flex;gap:8px;flex-wrap:wrap}
.horse-count{font-size:10px;color:var(--green);margin-top:4px}

/* プログレス */
.progress-wrap{margin-bottom:12px}
.progress-bar{height:6px;background:#222;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:3px;transition:width .3s}
.progress-text{font-size:10px;color:var(--text2);margin-top:4px;text-align:right}

/* サマリー */
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.summary-item{background:var(--card2);border-radius:8px;padding:10px;text-align:center}
.summary-num{font-size:22px;font-weight:800}
.summary-label{font-size:9px;color:var(--text2);margin-top:2px;letter-spacing:.05em}
.num-gold{color:var(--gold)}
.num-green{color:var(--green)}
.num-red{color:var(--red)}

/* 手動URL入力 */
.url-input{width:100%;background:#0a0a15;border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:8px}
.url-input:focus{outline:1px solid var(--gold)}
.btn-sm{padding:8px 14px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}
.btn-green{background:var(--green);color:#000}
.btn-gray{background:#333;color:var(--text2)}

/* タブ */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px}
.tab{flex:1;padding:10px;font-size:12px;font-weight:700;border:none;background:none;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

main{padding:14px}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">🏇 ネット競馬 データ収集</div>
    <div class="header-sub">AI × Firestore × netkeiba</div>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
    <div class="status-dot" id="fbDot"></div>
    <div style="font-size:10px;color:var(--text2)" id="fbStatus">接続中...</div>
  </div>
</div>

<main>
  <!-- タブ -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('auto')" id="tab-auto">🤖 AI自動取得</button>
    <button class="tab" onclick="switchTab('manual')" id="tab-manual">🔗 URL手動入力</button>
    <button class="tab" onclick="switchTab('saved')" id="tab-saved">💾 保存済み</button>
  </div>

  <!-- AI自動取得タブ -->
  <div id="pane-auto">
    <div class="card">
      <div class="card-title">📅 取得対象</div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn-sm" id="btnTomorrow" onclick="setTargetDate('tomorrow')"
          style="flex:1;background:var(--gold);color:#000">明日</button>
        <button class="btn-sm" id="btnToday" onclick="setTargetDate('today')"
          style="flex:1;background:#333;color:var(--text2)">今日</button>
        <button class="btn-sm" id="btnCustom" onclick="setTargetDate('custom')"
          style="flex:1;background:#333;color:var(--text2)">日付指定</button>
      </div>
      <div id="customDateWrap" style="display:none;margin-bottom:8px">
        <input type="date" id="customDate" class="url-input" style="margin:0">
      </div>
      <div id="targetDateDisp" style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:4px"></div>
      <div style="font-size:10px;color:var(--text2)">AIがGoogle検索でレース情報を収集→Firestore保存</div>
    </div>

    <button class="fetch-btn" id="fetchBtn" onclick="startFetch()">
      🤖 AI自動取得を開始
    </button>

    <div class="card" id="progressCard" style="display:none">
      <div class="card-title">⚡ 取得進捗</div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <div class="progress-text" id="progressText">準備中...</div>
      </div>
      <div class="log-area" id="logArea"></div>
    </div>

    <div id="summaryCard" style="display:none" class="card">
      <div class="card-title">📊 取得結果</div>
      <div class="summary-grid">
        <div class="summary-item"><div class="summary-num num-gold" id="sumTotal">0</div><div class="summary-label">レース数</div></div>
        <div class="summary-item"><div class="summary-num num-green" id="sumSaved">0</div><div class="summary-label">保存成功</div></div>
        <div class="summary-item"><div class="summary-num num-red" id="sumFailed">0</div><div class="summary-label">失敗</div></div>
      </div>
    </div>

    <div id="raceListArea"></div>
  </div>

  <!-- URL手動入力タブ -->
  <div id="pane-manual" style="display:none">
    <div class="card">
      <div class="card-title">🔗 netkeiba URL入力</div>
      <input class="url-input" id="manualUrl" placeholder="https://race.netkeiba.com/race/shutuba.html?race_id=...">
      <div style="display:flex;gap:8px">
        <button class="btn-sm btn-green" onclick="fetchManualUrl()" style="flex:1">🤖 AI解析 → 保存</button>
        <button class="btn-sm btn-gray" onclick="document.getElementById('manualUrl').value=''" style="flex:0 0 auto">クリア</button>
      </div>
      <div id="manualResult" style="margin-top:10px;font-size:12px;color:var(--text2)"></div>
    </div>
    <div id="manualRaceArea"></div>
  </div>

  <!-- 保存済みタブ -->
  <div id="pane-saved" style="display:none">
    <div class="card">
      <div class="card-title">💾 Firestore保存済みレース</div>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <input type="date" id="savedDateFilter" class="url-input" style="flex:1;margin:0">
        <button class="btn-sm btn-green" onclick="loadSavedRaces()">表示</button>
      </div>
      <div id="savedRaceList"><div style="color:var(--text2);font-size:12px;text-align:center;padding:20px">日付を選んで表示</div></div>
    </div>
  </div>
</main>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js';
import { getFirestore, collection, doc, setDoc, getDocs, query, where, orderBy, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCVk2miG5TK1ffTofXLh0hHgeSbOvmIgZ8",
  authDomain: "kensetsu-nippo-842a2.firebaseapp.com",
  projectId: "kensetsu-nippo-842a2",
  storageBucket: "kensetsu-nippo-842a2.appspot.com",
  messagingSenderId: "1234567890",
  appId: "1:1234567890:web:abcdef"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.__fb = { db, collection, doc, setDoc, getDocs, query, where, orderBy, serverTimestamp };
document.getElementById('fbDot').classList.add('on');
document.getElementById('fbStatus').textContent = 'Firestore接続済み';
</script>

<script>
var FUNC_BASE = (location.hostname==='localhost'||location.hostname==='127.0.0.1')
  ? 'http://localhost:5001/kensetsu-nippo-842a2/us-central1'
  : 'https://us-central1-kensetsu-nippo-842a2.cloudfunctions.net';
var HH_KEY = 'HeartsHouse2026Key';

var _targetDate = 'tomorrow';
var _targetDateStr = '';

// ===== 初期化 =====
(function init() {
  setTargetDate('tomorrow');
  var now = new Date();
  document.getElementById('savedDateFilter').value = now.toISOString().slice(0,10);
  document.getElementById('customDate').value = now.toISOString().slice(0,10);
})();

function switchTab(name) {
  ['auto','manual','saved'].forEach(function(t) {
    document.getElementById('pane-' + t).style.display = t === name ? 'block' : 'none';
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
  });
}

function setTargetDate(type) {
  _targetDate = type;
  var now = new Date();
  var target = new Date(now);
  if (type === 'tomorrow') target.setDate(now.getDate() + 1);

  ['today','tomorrow','custom'].forEach(function(t) {
    var btn = document.getElementById('btn' + t.charAt(0).toUpperCase() + t.slice(1));
    if (btn) {
      btn.style.background = t === type ? 'var(--gold)' : '#333';
      btn.style.color = t === type ? '#000' : 'var(--text2)';
    }
  });

  document.getElementById('customDateWrap').style.display = type === 'custom' ? 'block' : 'none';

  if (type === 'custom') {
    var customVal = document.getElementById('customDate').value;
    _targetDateStr = customVal || target.toISOString().slice(0,10);
  } else {
    _targetDateStr = target.toISOString().slice(0,10);
  }

  var dateObj = new Date(_targetDateStr);
  var wdays = ['日','月','火','水','木','金','土'];
  document.getElementById('targetDateDisp').textContent =
    _targetDateStr + '（' + wdays[dateObj.getDay()] + '）のレースを取得';
}

// ===== ログ =====
var _logs = [];
function addLog(msg, type) {
  type = type || 'info';
  var now = new Date();
  var ts = ('0'+now.getHours()).slice(-2) + ':' + ('0'+now.getMinutes()).slice(-2) + ':' + ('0'+now.getSeconds()).slice(-2);
  _logs.push({ts:ts,msg:msg,type:type});
  var area = document.getElementById('logArea');
  if (!area) return;
  area.innerHTML = _logs.slice(-30).map(function(l) {
    return '<div class="log-item ' + (l.type==='error'?'err':l.type==='ok'?'ok':l.type==='warn'?'warn':'') + '">'
      + '<span class="ts">' + l.ts + '</span><span>' + l.msg + '</span></div>';
  }).join('');
  area.scrollTop = area.scrollHeight;
}

// ===== プログレス =====
function setProgress(pct, text) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = text;
}

// ===== AI呼び出し =====
async function callAI(prompt, useSearch, useUrl, targetUrl) {
  var body = {
    model: 'gemini-2.5-flash',
    mode: 'horse',
    prompt: prompt,
    useSearch: useSearch || false,
    useUrl: useUrl || false
  };
  if (targetUrl) body.url = targetUrl;
  var r = await fetch(FUNC_BASE + '/askAI', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-access-key': HH_KEY },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  var d = await r.json();
  return d?.data?.text || d?.candidates?.[0]?.content?.parts?.[0]?.text || d?.text || '';
}

// ===== Step1: Google検索でレース一覧を取得 =====
async function fetchRaceListBySearch(dateStr) {
  var dateObj = new Date(dateStr);
  var y = dateObj.getFullYear();
  var m = dateObj.getMonth() + 1;
  var d = dateObj.getDate();
  var wdays = ['日','月','火','水','木','金','土'];
  var wday = wdays[dateObj.getDay()];

  var prompt = [
    'あなたは競馬データ収集AIです。',
    '',
    '【依頼】' + y + '年' + m + '月' + d + '日（' + wday + '）のJRA競馬開催情報を収集してください。',
    '',
    '以下の情報をJSON形式のみで返してください：',
    '{',
    '  "raceDate": "' + dateStr + '",',
    '  "kaisaiList": [',
    '    {',
    '      "venue": "東京",',
    '      "venueCode": "05",',
    '      "kaisaiNum": 1,',
    '      "raceCount": 12',
    '    }',
    '  ]',
    '}',
    '',
    '【venueCode対応】東京=05 中山=06 阪神=08 京都=09 小倉=10 新潟=03 中京=07 福島=02 札幌=01 函館=04',
    '開催がない場合は kaisaiList を空配列にしてください。',
    '必ずJSONのみ返してください。'
  ].join('\n');

  var text = await callAI(prompt, true, false, null);
  var clean = text.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

// ===== Step2: 各レースの出馬表をAI取得 =====
async function fetchRaceDetail(dateStr, venue, venueCode, raceNum) {
  var dateNoHyphen = dateStr.replace(/-/g,'');
  var raceNumStr = ('0' + raceNum).slice(-2);
  var kaisaiNumStr = '01';
  var raceId = dateNoHyphen + venueCode + kaisaiNumStr + raceNumStr;
  var netkeibaUrl = 'https://race.netkeiba.com/race/shutuba.html?race_id=' + raceId;

  var prompt = [
    'あなたは競馬出馬表データ収集AIです。',
    '以下のnetkeiba出馬表ページから出馬表データを取得してください。',
    'URL: ' + netkeibaUrl,
    '',
    '以下のJSON形式のみで返してください：',
    '{',
    '  "raceName": "レース名",',
    '  "raceNum": ' + raceNum + ',',
    '  "venue": "' + venue + '",',
    '  "distance": 距離(数値),',
    '  "surface": "芝またはダート",',
    '  "baba": "良・稍重・重・不良",',
    '  "raceClass": "3歳未勝利など",',
    '  "horses": [',
    '    {',
    '      "horseNum": 馬番,',
    '      "frameNum": 枠番,',
    '      "horseName": "馬名",',
    '      "sex": "牡牝セ",',
    '      "age": 年齢,',
    '      "weight": 斤量,',
    '      "jockey": "騎手名",',
    '      "trainer": "調教師名",',
    '      "horseWeight": 馬体重または0,',
    '      "odds": 単勝オッズまたは0,',
    '      "popularity": 人気順または0',
    '    }',
    '  ]',
    '}',
    '',
    'データが取得できない場合は {"error": "取得失敗"} を返してください。',
    'JSONのみ返してください。'
  ].join('\n');

  var text = await callAI(prompt, false, true, netkeibaUrl);
  var clean = text.replace(/```json|```/g,'').trim();
  var data = JSON.parse(clean);
  data.raceId = raceId;
  data.raceDate = dateStr;
  data.netkeibaUrl = netkeibaUrl;
  return data;
}

// ===== Step3: Firestoreに保存 =====
async function saveRaceToFirestore(raceData) {
  var fbInst = window.__fb;
  if (!fbInst) throw new Error('Firebase未接続');
  var {db, doc, setDoc, serverTimestamp} = fbInst;
  var raceRef = doc(db, 'keiba_races', raceData.raceId);
  await setDoc(raceRef, {
    raceId: raceData.raceId,
    raceName: raceData.raceName || '',
    raceNum: raceData.raceNum || 0,
    raceDate: raceData.raceDate || '',
    venue: raceData.venue || '',
    distance: raceData.distance || 0,
    surface: raceData.surface || '',
    baba: raceData.baba || '',
    raceClass: raceData.raceClass || '',
    netkeibaUrl: raceData.netkeibaUrl || '',
    horseCount: (raceData.horses || []).length,
    savedAt: serverTimestamp()
  });
  var horsesRef = fbInst.collection(db, 'keiba_races', raceData.raceId, 'horses');
  for (var h of (raceData.horses || [])) {
    var hRef = doc(db, 'keiba_races', raceData.raceId, 'horses', String(h.horseNum));
    await setDoc(hRef, h);
  }
}

// ===== メイン取得処理 =====
async function startFetch() {
  if (_targetDate === 'custom') {
    _targetDateStr = document.getElementById('customDate').value;
  }
  if (!_targetDateStr) { alert('日付を選択してください'); return; }

  var btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 取得中...';
  document.getElementById('progressCard').style.display = 'block';
  document.getElementById('summaryCard').style.display = 'none';
  document.getElementById('raceListArea').innerHTML = '';
  _logs = [];
  setProgress(0, '開始中...');

  var totalRaces = 0, savedCount = 0, failedCount = 0;
  var raceCards = [];

  try {
    // Step1: 開催場取得
    addLog('Google検索で開催情報を取得中...', 'info');
    setProgress(5, 'Step1: 開催場を検索中...');
    var schedule = await fetchRaceListBySearch(_targetDateStr);
    var kaisaiList = schedule.kaisaiList || [];

    if (kaisaiList.length === 0) {
      addLog('この日は開催なし', 'warn');
      setProgress(100, '開催なし');
      document.getElementById('raceListArea').innerHTML =
        '<div style="text-align:center;padding:30px;color:var(--text2);font-size:13px">この日は開催がありません</div>';
      return;
    }

    addLog(kaisaiList.length + '会場で開催：' + kaisaiList.map(function(k){return k.venue;}).join('・'), 'ok');

    // 全レース数を計算
    kaisaiList.forEach(function(k) { totalRaces += (k.raceCount || 12); });
    document.getElementById('sumTotal').textContent = totalRaces;

    var done = 0;
    // Step2: 各レースの出馬表を取得
    for (var ki = 0; ki < kaisaiList.length; ki++) {
      var kaisai = kaisaiList[ki];
      addLog(kaisai.venue + ' ' + (kaisai.raceCount||12) + 'レースを取得開始', 'info');

      for (var rn = 1; rn <= (kaisai.raceCount || 12); rn++) {
        done++;
        setProgress(Math.round(5 + done / totalRaces * 85), kaisai.venue + ' ' + rn + 'R取得中...');
        addLog(kaisai.venue + ' ' + rn + 'R 取得中...', 'info');

        var cardId = 'race_' + kaisai.venueCode + '_' + rn;
        renderRaceCard(cardId, kaisai.venue + ' ' + rn + 'R', 'pending');

        try {
          var raceData = await fetchRaceDetail(_targetDateStr, kaisai.venue, kaisai.venueCode, rn);
          if (raceData.error) {
            addLog(kaisai.venue + ' ' + rn + 'R 取得失敗', 'error');
            updateRaceCard(cardId, null, 'failed');
            failedCount++;
          } else {
            await saveRaceToFirestore(raceData);
            addLog(kaisai.venue + ' ' + rn + 'R「' + raceData.raceName + '」保存完了 (' + (raceData.horses||[]).length + '頭)', 'ok');
            updateRaceCard(cardId, raceData, 'saved');
            savedCount++;
          }
        } catch(e) {
          addLog(kaisai.venue + ' ' + rn + 'R エラー: ' + e.message, 'error');
          updateRaceCard(cardId, null, 'failed');
          failedCount++;
        }

        document.getElementById('sumSaved').textContent = savedCount;
        document.getElementById('sumFailed').textContent = failedCount;

        // 少し待つ（API負荷軽減）
        await new Promise(function(res){ setTimeout(res, 800); });
      }
    }

    setProgress(100, '完了！');
    addLog('取得完了: ' + savedCount + '件保存 / ' + failedCount + '件失敗', savedCount > 0 ? 'ok' : 'warn');

  } catch(e) {
    addLog('エラー: ' + e.message, 'error');
    setProgress(100, 'エラー発生');
  } finally {
    document.getElementById('summaryCard').style.display = 'block';
    document.getElementById('sumTotal').textContent = totalRaces;
    document.getElementById('sumSaved').textContent = savedCount;
    document.getElementById('sumFailed').textContent = failedCount;
    btn.disabled = false;
    btn.textContent = '🤖 AI自動取得を開始';
  }
}

// ===== レースカード描画 =====
function renderRaceCard(id, title, status) {
  var area = document.getElementById('raceListArea');
  var div = document.createElement('div');
  div.className = 'race-item';
  div.id = id;
  div.innerHTML = '<div class="race-header">'
    + '<div class="race-rank">?</div>'
    + '<div class="race-name">' + title + '</div>'
    + '<span class="race-badge badge-pending">取得中</span>'
    + '</div>';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function updateRaceCard(id, raceData, status) {
  var div = document.getElementById(id);
  if (!div) return;
  div.className = 'race-item ' + status;
  if (status === 'saved' && raceData) {
    div.innerHTML = '<div class="race-header">'
      + '<div class="race-rank" style="background:var(--turf);color:#fff">' + raceData.raceNum + 'R</div>'
      + '<div class="race-name">' + (raceData.raceName||raceData.venue+' '+raceData.raceNum+'R') + '</div>'
      + '<span class="race-badge badge-saved">✅ 保存済</span>'
      + '</div>'
      + '<div class="race-meta">'
      + '<span>' + (raceData.venue||'') + '</span>'
      + '<span>' + (raceData.distance||'') + 'm</span>'
      + '<span>' + (raceData.surface||'') + '</span>'
      + '<span>' + (raceData.baba||'') + '</span>'
      + '</div>'
      + '<div class="horse-count">🐴 ' + (raceData.horses||[]).length + '頭</div>';
  } else if (status === 'failed') {
    var title = div.querySelector('.race-name') ? div.querySelector('.race-name').textContent : id;
    div.innerHTML = '<div class="race-header">'
      + '<div class="race-rank" style="background:#333;color:#666">-</div>'
      + '<div class="race-name">' + title + '</div>'
      + '<span class="race-badge badge-failed">❌ 失敗</span>'
      + '</div>';
  }
}

// ===== 手動URL取得 =====
async function fetchManualUrl() {
  var url = document.getElementById('manualUrl').value.trim();
  if (!url || !url.includes('netkeiba')) { alert('netkeibaのURLを入力してください'); return; }
  document.getElementById('manualResult').textContent = '🤖 AI解析中...';

  try {
    var prompt = [
      'あなたは競馬出馬表データ収集AIです。以下のnetkeiba出馬表ページから出馬表データを取得してください。',
      'URL: ' + url,
      '以下のJSON形式のみで返してください：',
      '{"raceName":"","raceNum":0,"venue":"","distance":0,"surface":"","baba":"","raceClass":"",',
      '"horses":[{"horseNum":0,"frameNum":0,"horseName":"","sex":"","age":0,"weight":0,"jockey":"","trainer":"","horseWeight":0,"odds":0,"popularity":0}]}'
  ].join('\n');

    var text = await callAI(prompt, false, true, url);
    var clean = text.replace(/```json|```/g,'').trim();
    var raceData = JSON.parse(clean);

    // race_idをURLから抽出
    var match = url.match(/race_id=(\d+)/);
    raceData.raceId = match ? match[1] : 'manual_' + Date.now();
    raceData.raceDate = raceData.raceId.slice(0,4) + '-' + raceData.raceId.slice(4,6) + '-' + raceData.raceId.slice(6,8);
    raceData.netkeibaUrl = url;

    await saveRaceToFirestore(raceData);
    document.getElementById('manualResult').textContent = '✅ 「' + raceData.raceName + '」' + (raceData.horses||[]).length + '頭を保存しました';
    document.getElementById('manualResult').style.color = 'var(--green)';

    // カード表示
    var area = document.getElementById('manualRaceArea');
    area.innerHTML = '<div class="race-item saved"><div class="race-header">'
      + '<div class="race-rank" style="background:var(--turf);color:#fff">' + raceData.raceNum + 'R</div>'
      + '<div class="race-name">' + raceData.raceName + '</div>'
      + '<span class="race-badge badge-saved">✅ 保存済</span>'
      + '</div>'
      + '<div class="race-meta"><span>' + raceData.venue + '</span><span>' + raceData.distance + 'm</span><span>' + raceData.surface + '</span></div>'
      + '<div class="horse-count">🐴 ' + (raceData.horses||[]).length + '頭</div></div>';

  } catch(e) {
    document.getElementById('manualResult').textContent = '❌ 失敗: ' + e.message;
    document.getElementById('manualResult').style.color = 'var(--red)';
  }
}

// ===== 保存済みレース読み込み =====
async function loadSavedRaces() {
  var dateVal = document.getElementById('savedDateFilter').value;
  if (!dateVal) { alert('日付を選択してください'); return; }
  var area = document.getElementById('savedRaceList');
  area.innerHTML = '<div style="color:var(--text2);font-size:12px;text-align:center;padding:20px">読み込み中...</div>';

  try {
    var fbInst = window.__fb;
    var {db, collection, getDocs, query, where} = fbInst;
    var snap = await getDocs(query(collection(db, 'keiba_races'), where('raceDate', '==', dateVal)));

    if (snap.empty) {
      area.innerHTML = '<div style="color:var(--text2);font-size:12px;text-align:center;padding:20px">' + dateVal + ' のデータなし</div>';
      return;
    }

    var races = snap.docs.map(function(d) { return d.data(); });
    races.sort(function(a,b) { return (a.venue||'').localeCompare(b.venue||'') || (a.raceNum||0) - (b.raceNum||0); });

    area.innerHTML = races.map(function(r) {
      return '<div class="race-item saved" style="cursor:pointer" onclick="showRaceDetail(\"' + r.raceId + '\")">'
        + '<div class="race-header">'
        + '<div class="race-rank" style="background:var(--turf);color:#fff">' + r.raceNum + 'R</div>'
        + '<div class="race-name">' + (r.raceName||r.venue+' '+r.raceNum+'R') + '</div>'
        + '<span class="race-badge badge-saved">✅</span>'
        + '</div>'
        + '<div class="race-meta">'
        + '<span>🏟 ' + r.venue + '</span>'
        + '<span>' + r.distance + 'm</span>'
        + '<span>' + r.surface + '</span>'
        + '<span>' + r.baba + '</span>'
        + '</div>'
        + '<div class="horse-count">🐴 ' + (r.horseCount||0) + '頭</div>'
        + '</div>';
    }).join('');

  } catch(e) {
    area.innerHTML = '<div style="color:var(--red);font-size:12px;padding:10px">エラー: ' + e.message + '</div>';
  }
}

async function showRaceDetail(raceId) {
  alert('race_id: ' + raceId + ' 複勝アプリからこのIDでデータを取得できます');
}
